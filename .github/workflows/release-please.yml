# Self-hosted release automation, replacing the Stainless-run release-please
# after the Stainless platform sunset (2026-09-01).
#
# On every push to main this opens or updates a "release: x.y.z" PR from the
# existing release-please-config.json + .release-please-manifest.json. Merging
# that PR creates the git tag and the GitHub Release, which triggers
# .github/workflows/publish-pypi.yml.
#
# RELEASE_PLEASE_TOKEN must be a fine-grained PAT (or GitHub App installation
# token) with Contents: write and Pull requests: write on this repository.
# The default GITHUB_TOKEN cannot be used here: releases created with it do
# not trigger other workflows, so publishing would silently never run.
name: Release Please

on:
  push:
    branches:
      - main

jobs:
  release-please:
    name: release please
    runs-on: ubuntu-latest
    if: github.repository == 'landing-ai/ade-python'
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
